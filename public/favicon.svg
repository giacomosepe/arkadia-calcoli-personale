<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>
      .bg   { fill: #eef2ff; }
      .db   { fill: #1B1F2E; }
      .acc  { fill: #4f46e5; }
    </style>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" class="bg"/>

  <!-- Doc shape -->
  <rect x="7" y="5" width="14" height="18" rx="2" class="db" opacity="0.1"/>
  <rect x="7" y="5" width="14" height="18" rx="2" fill="none" stroke="#1B1F2E" stroke-width="1" opacity="0.2"/>

  <!-- Data rows -->
  <rect x="10" y="9"  width="6" height="2" rx="1" class="db" opacity="0.6"/>
  <rect x="17" y="9"  width="2" height="2" rx="1" class="db" opacity="0.3"/>
  <rect x="10" y="13" width="4" height="2" rx="1" class="db" opacity="0.3"/>
  <rect x="15" y="13" width="4" height="2" rx="1" class="db" opacity="0.55"/>
  <rect x="10" y="17" width="5" height="2" rx="1" class="db" opacity="0.5"/>
  <rect x="16" y="17" width="3" height="2" rx="1" class="db" opacity="0.3"/>

  <!-- Progress bar -->
  <rect x="10" y="20" width="8" height="2.5" rx="1.2" class="db" opacity="0.1"/>
  <rect x="10" y="20" width="6" height="2.5" rx="1.2" class="acc"/>

  <!-- Checkmark top right -->
  <polyline points="22,5 24,8 28,3" fill="none" stroke="#1B1F2E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

</svg>
